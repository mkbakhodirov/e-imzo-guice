<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-IMZO Demo</title>
    <script src="/demo/e-imzo.js" type="text/javascript"></script>
    <script src="/demo/e-imzo-client.js?v=1.2" type="text/javascript"></script>
    <script src="/demo/micro-ajax.js" type="text/javascript"></script>
    <script src="/demo/e-imzo-init.js?v=1.0" type="text/javascript"></script>
</head>
<body>
<p>Sign in with a PFX key file</p>
<form name="testform">
    <select name="key" onchange="cbChanged(this)"></select>
    <button onclick="signinPFX()" type="button" id="signinPFXButton">Sign in</button><br>
</form>

<p>Sign in with a USB token</p>
<button onclick="signinToken()" type="button" id="signinTokenButton">Sign in</button><br>
<label id="progress" style="color: green;"></label>
<label id="message" style="color: red;"></label>

<script>

    var uiShowMessage = function(message) {
        alert(message);
    };

    var uiLoading = function() {
        var l = document.getElementById('message');
        l.innerHTML = 'Loading ...';
        l.style.color = 'red';
    };

    var uiNotLoaded = function(e) {
        var l = document.getElementById('message');
        l.innerHTML = '';
        if (e) {
            wsError(e);
        } else {
            uiShowMessage(errorBrowserWS);
        }
    };

    var uiUpdateApp = function() {
        var l = document.getElementById('message');
        l.innerHTML = errorUpdateApp;
    };

    var uiAppLoad = function() {
        uiClearCombo();
        EIMZOClient.listAllUserKeys(function(o, i) {
            return "itm-" + o.serialNumber + "-" + i;
        }, function(itemId, v) {
            return uiCreateItem(itemId, v);
        }, function(items, firstId) {
            uiFillCombo(items);
            uiLoaded();
            uiComboSelect(firstId);
        }, uiHandleError);
        if (!EIMZOClient.NEW_API3) {
            alert("E-IMZO version should be 4.86 or newer");
        }
    };

    var uiComboSelect = function(itm) {
        if (itm) {
            var id = document.getElementById(itm);
            id.setAttribute('selected', 'true');
        }
    };

    var cbChanged = function() {
        if (document.getElementById('keyId')) {
            document.getElementById('keyId').innerHTML = '';
        }
    };

    var uiClearCombo = function() {
        document.testform.key.length = 0;
    };

    var uiFillCombo = function(items) {
        var combo = document.testform.key;
        for (var itm in items) {
            combo.append(items[itm]);
        }
    };

    var uiLoaded = function() {
        document.getElementById('message').innerHTML = '';
    };

    var uiCreateItem = function(itmkey, vo) {
        var now = new Date();
        vo.expired = dates.compare(now, vo.validTo) > 0;
        var itm = document.createElement("option");
        itm.value = itmkey;
        itm.text = vo.CN;
        if (vo.expired) {
            itm.style.color = 'gray';
            itm.text = itm.text + ' (expired)';
        }
        itm.setAttribute('vo', JSON.stringify(vo));
        itm.setAttribute('id', itmkey);
        return itm;
    };

    var uiShowProgress = function() {
        var l = document.getElementById('progress');
        l.innerHTML = 'Signing, please wait.';
        l.style.color = 'green';
    };

    var uiHideProgress = function() {
        document.getElementById('progress').innerHTML = '';
    };

    signinPFX = function() {
        uiShowProgress();
        getChallenge(function(challenge) {
            var itm = document.testform.key.value;
            if (itm) {
                var id = document.getElementById(itm);
                var vo = JSON.parse(id.getAttribute('vo'));
                EIMZOClient.loadKey(vo, function(id) {
                    auth(id, challenge, function(redirect) {
                        window.location.href = redirect;
                    });
                }, uiHandleError);
            } else {
                uiHideProgress();
            }
        });
    };

    signinToken = function() {
        uiShowProgress();
        getChallenge(function(challenge) {
            auth("ckc", challenge, function(redirect) {
                window.location.href = redirect;
            });
        });
    };

    getChallenge = function(callback) {
        microAjax('/frontend/challenge?_uc=' + (Date.now() + "_" + Math.random()), function(data, s) {
            if (s.status !== 200) {
                uiShowMessage(s.status + " - " + s.statusText);
                return;
            }
            try {
                data = JSON.parse(data);
                if (data.status !== 1) {
                    uiShowMessage(data.status + " - " + data.message);
                    return;
                }
                callback(data.challenge);
            } catch (e) {
                uiShowMessage(s.status + " - " + s.statusText + ": " + e);
            }
        });
    };

    auth = function(keyId, challenge, callback) {
        EIMZOClient.createPkcs7(keyId, challenge, null, function(pkcs7) {
            microAjax('auth', function(data, s) {
                uiHideProgress();
                if (s.status !== 200) {
                    uiShowMessage(s.status + " - " + s.statusText);
                    return;
                }
                try {
                    data = JSON.parse(data);
                    if (data.status !== 1) {
                        uiShowMessage(data.status + " - " + data.message);
                        return;
                    }
                    callback(data.redirect);
                } catch (e) {
                    uiShowMessage(s.status + " - " + s.statusText + ": " + e);
                }
            }, 'keyId=' + encodeURIComponent(keyId) + '&pkcs7=' + encodeURIComponent(pkcs7));
        }, uiHandleError, false);
    };

    window.onload = AppLoad;
</script>
</body>
</html>
